name: Neko Throne build matrix
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release Tag and version"
        required: true
      publish:
        description: "r for normal release, p for prerelease, leave empty to not publish anything"
        required: false
jobs:
  build-go:
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - cross_os: windows
            cross_arch: amd64
            go_version: "1.25.8"
          - cross_os: linux
            cross_arch: amd64
            go_version: "1.25.8"
      fail-fast: false
    runs-on: ubuntu-latest
    steps:
      - name: Checking out sources
        uses: actions/checkout@v4.2.2
      - name: Cache Common Download
        id: cache-common
        uses: actions/cache@v4.2.3
        with:
          path: artifacts.tgz
          key: CommonCache-${{ matrix.cross_os }}-${{ matrix.cross_arch }}-${{ hashFiles('script/build_go.sh', 'core/*') }}-${{ matrix.go_version }}
      - name: Install Golang
        if: steps.cache-common.outputs.cache-hit != 'true'
        uses: actions/setup-go@v5.5.0
        with:
          go-version: ${{ matrix.go_version }}
          cache-dependency-path: |
            core/server/go.sum
      - name: Install Protoc
        run: |
          curl -LO "https://github.com/protocolbuffers/protobuf/releases/download/v31.1/protoc-31.1-linux-x86_64.zip"
          unzip "protoc-31.1-linux-x86_64.zip" -d protoc_install
          cp ./protoc_install/bin/protoc /usr/local/bin
          protoc --version
      - name: Installing protoc-gen-go
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
      - name: Build golang parts
        if: steps.cache-common.outputs.cache-hit != 'true'
        shell: bash
        run: |
          GOOS=${{ matrix.cross_os }} GOARCH=${{ matrix.cross_arch }} ./script/build_go.sh
      - name: Tar files
        if: steps.cache-common.outputs.cache-hit != 'true'
        run: tar czvf artifacts.tgz ./deployment
      - name: Uploading Artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: NekoThrone-${{ github.sha }}-Common-${{ matrix.cross_os }}-${{ matrix.cross_arch }}
          path: artifacts.tgz
  build-cpp:
    permissions:
      contents: read
    needs:
      - build-go
    strategy:
      matrix:
        include:
          - platform: windows-latest
            qt_version: "6.10.2"
            target: x86_64
          - platform: ubuntu-22.04
            qt_version: "6.10.2"
            target: amd64
      fail-fast: false
    runs-on: ${{ matrix.platform }}
    env:
      ACTIONS_ALLOW_UNSECURE_COMMANDS: true
      INPUT_VERSION: ${{ github.event.inputs.tag }}
    steps:
      - name: Checking out sources
        uses: actions/checkout@v4.2.2
        with:
          submodules: "recursive"
      - name: Install MSVC compiler
        if: matrix.platform == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1.13.0
        with:
          arch: ${{ matrix.target }}
      - name: Download Artifacts
        uses: actions/download-artifact@v4.3.0
        with:
          path: download-artifact
      # ========================================================================================================= Qt Install
      - name: OpenSSL Cache
        id: cache-openssl
        if: matrix.platform == 'windows-latest'
        uses: actions/cache@v4.2.3
        with:
          path: C:/vcpkg/installed/x64-windows-static
          key: OpenSSLCache-${{ matrix.platform }}-${{ matrix.target }}
      - name: Install OpenSSL (Windows)
        if: matrix.platform == 'windows-latest' && steps.cache-openssl.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" | Out-File -FilePath $env:GITHUB_ENV -Append
          vcpkg install openssl:x64-windows-static
      - name: Qt static Cache
        id: cache-static-Qt
        if: matrix.platform == 'windows-latest'
        uses: actions/cache@v4.2.3
        with:
          path: qt6/build
          key: QtStaticCache-${{ matrix.platform }}-${{ matrix.target }}-Qt${{ matrix.qt_version }}-${{ hashFiles('script/build_qt_static_windows.bat') }}
      - name: Install Qt Windows
        shell: cmd
        if: matrix.platform == 'windows-latest' && steps.cache-static-Qt.outputs.cache-hit != 'true'
        run: |
          ./script/build_qt_static_windows.bat ${{ matrix.qt_version }}
      - name: Install Qt (Linux)
        uses: jurplel/install-qt-action@v4.3.0
        if: matrix.platform == 'ubuntu-22.04'
        with:
          version: ${{ matrix.qt_version }}
          setup-python: true
          cache: true
          cache-key-prefix: QtCache-${{ matrix.platform }}-${{ matrix.target }}
      # ========================================================================================================= Generate MakeFile and Build
      - name: Windows - Generate MakeFile and Build
        shell: bash
        if: matrix.platform == 'windows-latest'
        run: |
          export CMAKE_PREFIX_PATH=$PWD/qt6/build/lib/cmake
          export OPENSSL_ROOT_DIR="C:/vcpkg/installed/x64-windows-static"
          mkdir build
          cd build
          curl -fLso srslist.h "https://raw.githubusercontent.com/throneproj/routeprofiles/rule-set/srslist.h"
          cmake -GNinja -DCMAKE_BUILD_TYPE=RelWithDebInfo ..
          ninja
          cd ..
          ./script/deploy_windows.sh
      - name: Linux - Generate MakeFile and Build
        shell: bash
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt update && sudo apt upgrade -y
          mkdir build
          cd build
          curl -fLso srslist.h "https://raw.githubusercontent.com/throneproj/routeprofiles/rule-set/srslist.h"
          cmake -GNinja -DCMAKE_BUILD_TYPE=RelWithDebInfo -DCMAKE_EXE_LINKER_FLAGS="-static-libgcc -static-libstdc++" ..
          ninja
          cd ..
          ./script/deploy_linux64.sh
      # ========================================================================================================= Deployments
      - name: Tar files
        shell: bash
        run: tar czvf artifacts.tgz ./deployment
      - name: Uploading Artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: NekoThrone-${{ github.sha }}-${{ matrix.platform }}-${{ matrix.target }}-Qt${{ matrix.qt_version }}
          path: artifacts.tgz
  publish:
    name: Pack & Publish Release
    runs-on: ubuntu-latest
    needs:
      - build-cpp
    permissions:
      contents: write
      actions: read
    env:
      INPUT_VERSION: ${{ github.event.inputs.tag || format('nightly-{0}', github.run_number) }}
    steps:
      - name: Checking out sources
        uses: actions/checkout@v4.2.2
      - name: Download Artifacts
        uses: actions/download-artifact@v4.3.0
        with:
          path: download-artifact
      - name: Pack
        run: |
          curl -Lo - https://github.com/tcnksm/ghr/releases/download/v0.17.0/ghr_v0.17.0_linux_amd64.tar.gz | tar xzv
          mv ghr*linux_amd64/ghr .
          source script/env_deploy.sh
          find . -name artifacts.tgz | xargs -n1 tar xvzf
          cd deployment
          mkdir debug
          ####
          bash ../script/pack_debian.sh ${{ github.event.inputs.tag }}
          mv Throne.deb $version_standalone-debian-x64.deb
          rm -rf Throne
          ####
          mv linux-amd64 Throne
          mv Throne/Neko_Throne.debug debug/$version_standalone-linux-amd64.debug 2>/dev/null || mv Throne/Throne.debug debug/$version_standalone-linux-amd64.debug 2>/dev/null || true
          zip -9 -r $version_standalone-linux-amd64.zip Throne
          rm -rf Throne
          ####
          mv windows64 Throne
          find Throne -maxdepth 1 -name "*.pdb" | head -1 | xargs -I{} mv {} debug/$version_standalone-windows64.pdb 2>/dev/null || true
          zip -9 -r $version_standalone-windows64.zip Throne
          rm -rf Throne
          ####
          zip -9 -r debug-symbols.zip debug
      - name: Uploading Debug Artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: Debug-${{ github.sha }}
          path: deployment/debug-symbols.zip
      - name: Clean Up
        run: |
          cd deployment
          rm -rf linux-amd64
          rm -rf windows64
          rm -rf *.pdb
          rm -rf debug*
      - name: Uploading Artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: Deployment-${{ github.sha }}
          path: deployment
      - name: PreRelease
        if: github.event.inputs.publish == 'p'
        run: |
          ./ghr -prerelease -delete -c ${{ github.sha }} -t "${{ github.token }}" -n "${{ github.event.inputs.tag }}" "${{ github.event.inputs.tag }}" deployment
      - name: Release
        if: github.event.inputs.publish == 'r'
        run: |
          ./ghr -delete -c ${{ github.sha }} -t "${{ github.token }}" -n "${{ github.event.inputs.tag }}" "${{ github.event.inputs.tag }}" deployment
      - name: Auto Release (branch push)
        if: github.event_name == 'push'
        env:
          NIGHTLY_TAG: nightly-${{ github.run_number }}
        run: |
          ./ghr -prerelease -delete -c ${{ github.sha }} -t "${{ github.token }}" -n "Neko Throne $NIGHTLY_TAG" "$NIGHTLY_TAG" deployment
